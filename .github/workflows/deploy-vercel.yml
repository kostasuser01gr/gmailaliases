name: Deploy to Vercel (Production)

# Deploys this app to the existing Vercel project on every push to main.
# Runs on GitHub's runners (which can reach Vercel), so it does not depend on
# any local/sandbox network access.
#
# One-time setup: add a repository secret named VERCEL_TOKEN
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Create the token at https://vercel.com/account/tokens (scope: team kostasuser01gr)
# The org/project IDs below are not secrets — they identify the existing project.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: vercel-prod
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_7ACzzs0ColTE5Vz8B8hM5gzC
  VERCEL_PROJECT_ID: prj_40UPVJyFvkgFUBohIOwVGVNsC99x

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (Vercel)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "Deployed: $URL"
          echo "### ✅ Deployed to production" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
